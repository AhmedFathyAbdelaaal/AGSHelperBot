<div class="bg-white rounded-lg shadow p-6">
  <h2 class="text-xl font-bold mb-4 text-gray-800">User Statuses</h2>
  
  <div *ngIf="loading" class="text-gray-500">Loading...</div>
  
  <div *ngIf="!loading && statuses.length === 0" class="text-gray-500">No status data available.</div>
  
  <div *ngIf="!loading && statuses.length > 0" class="overflow-x-auto">
    <table class="min-w-full text-left text-sm whitespace-nowrap">
      <thead class="uppercase tracking-wider border-b-2 border-gray-200">
        <tr>
          <th scope="col" class="px-6 py-4">User ID</th>
          <th scope="col" class="px-6 py-4">Status</th>
          <th scope="col" class="px-6 py-4">Last Updated</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of statuses" class="border-b hover:bg-gray-50">
          <td class="px-6 py-4">{{ s.user_id }}</td>
          <td class="px-6 py-4">
            <span [ngClass]="{
              'bg-green-100 text-green-800': s.status === 'Active',
              'bg-yellow-100 text-yellow-800': s.status === 'Away',
              'bg-red-100 text-red-800': s.status === 'Busy Focusing'
            }" class="px-2 py-1 rounded-full text-xs font-medium">
              {{ s.status }}
            </span>
          </td>
          <td class="px-6 py-4">{{ s.timestamp | date:'medium' }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
