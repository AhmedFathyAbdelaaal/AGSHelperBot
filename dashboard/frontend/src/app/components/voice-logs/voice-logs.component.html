<div class="bg-white rounded-lg shadow p-6">
  <h2 class="text-xl font-bold mb-4 text-gray-800">Voice Channel Logs</h2>
  
  <div *ngIf="loading" class="text-gray-500">Loading logs...</div>
  <div *ngIf="!loading && logs.length === 0" class="text-gray-500">No logs found.</div>
  
  <div *ngIf="!loading && logs.length > 0" class="overflow-x-auto">
    <table class="min-w-full text-left text-sm whitespace-nowrap">
      <thead class="uppercase tracking-wider border-b-2 border-gray-200 bg-gray-50">
        <tr>
          <th scope="col" class="px-6 py-3">User</th>
          <th scope="col" class="px-6 py-3">Channel</th>
          <th scope="col" class="px-6 py-3">Joined</th>
          <th scope="col" class="px-6 py-3">Left</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let l of logs" class="border-b hover:bg-gray-50">
          <td class="px-6 py-4 font-medium">{{ l.username || l.user_id }}</td>
          <td class="px-6 py-4 text-indigo-600">{{ l.channel_name }}</td>
          <td class="px-6 py-4 text-green-600">{{ l.join_time | date:'short' }}</td>
          <td class="px-6 py-4 text-red-600">{{ l.leave_time ? (l.leave_time | date:'short') : 'In progress' }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
